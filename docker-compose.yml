# Hearthboard deployment
#
# Tuned for light hardware: memory caps, capped log files, healthchecks,
# and a Node heap limit on the backend. Adjust the *_MEM_LIMIT values in
# .env if your host has more (or less) to spare.
#
# .env variables:
#   TZ=America/New_York        # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
#   FRONTEND_PORT=3000
#   BACKEND_PORT=5000
#   BACKEND_MEM_LIMIT=256m
#   FRONTEND_MEM_LIMIT=64m
#   HEARTHBOARD_VERSION=latest # or pin a release tag (e.g. v2.0.0) from
#                              # https://github.com/eemersonrosa/hearthboard/releases

services:
  hearthboard-backend:
    container_name: hearthboard-backend
    image: ghcr.io/eemersonrosa/hearthboard-backend:${HEARTHBOARD_VERSION:-latest}
    volumes:
      - ./hearthboard/data:/app/data
      - ./hearthboard/uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=${BACKEND_PORT:-5000}
      - TZ=${TZ:-America/New_York}
      # Keep the V8 heap well under the container memory cap.
      - NODE_OPTIONS=--max-old-space-size=192
    mem_limit: ${BACKEND_MEM_LIMIT:-256m}
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - hearthboard-network
    restart: unless-stopped

  hearthboard-frontend:
    container_name: hearthboard-frontend
    image: ghcr.io/eemersonrosa/hearthboard-frontend:${HEARTHBOARD_VERSION:-latest}
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    environment:
      - FRONTEND_PORT=${FRONTEND_PORT:-3000}
      - BACKEND_SERVICE=hearthboard-backend
      - BACKEND_PORT=${BACKEND_PORT:-5000}
    mem_limit: ${FRONTEND_MEM_LIMIT:-64m}
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${FRONTEND_PORT}/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      - hearthboard-backend
    networks:
      - hearthboard-network
    restart: unless-stopped

networks:
  hearthboard-network:
    driver: bridge
