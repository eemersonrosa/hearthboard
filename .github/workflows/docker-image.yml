name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            context: ./client
            dockerfile: ./client/Dockerfile
            image: hearthboard-frontend
          - name: backend
            context: ./server
            dockerfile: ./server/Dockerfile
            image: hearthboard-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute build metadata
        id: buildmeta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "app_version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "app_version=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi
          echo "git_commit=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "repository=${GITHUB_REPOSITORY}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
# tags options:
# type=ref,event=branch
# type=sha,format=short
# ,enable={{is_default_branch}} # Could be used if we want to auto-publish on default branch
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=${{ matrix.image }}

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_APP_VERSION=${{ steps.buildmeta.outputs.app_version }}
            VITE_GIT_COMMIT=${{ steps.buildmeta.outputs.git_commit }}
            VITE_GITHUB_REPOSITORY=${{ steps.buildmeta.outputs.repository }}
            BACKEND_VERSION=${{ steps.buildmeta.outputs.app_version }}
            BACKEND_GIT_COMMIT=${{ steps.buildmeta.outputs.git_commit }}
            BACKEND_GITHUB_REPOSITORY=${{ steps.buildmeta.outputs.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # On version tags, publish a GitHub Release tied to the exact commit the
  # images were built from, with pull references pinned to this version.
  release:
    if: github.ref_type == 'tag'
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > notes.md <<EOF
          Docker images built from \`${GITHUB_SHA}\`:

          - \`ghcr.io/${GITHUB_REPOSITORY_OWNER}/hearthboard-backend:${GITHUB_REF_NAME}\`
          - \`ghcr.io/${GITHUB_REPOSITORY_OWNER}/hearthboard-frontend:${GITHUB_REF_NAME}\`

          To pin a deployment to this release, set in your \`.env\` next to
          \`docker-compose.yml\`:

          \`\`\`env
          HEARTHBOARD_VERSION=${GITHUB_REF_NAME}
          \`\`\`
          EOF
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Hearthboard ${GITHUB_REF_NAME}" \
            --notes-file notes.md
