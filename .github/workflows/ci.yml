name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # package-lock.json is gitignored in this repo, so no npm cache key
      # is available and npm ci cannot be used.
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
        working-directory: server
      - run: npm test
        working-directory: server

  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
        working-directory: client
      - run: npm test
        working-directory: client
      - run: npm run build
        working-directory: client
